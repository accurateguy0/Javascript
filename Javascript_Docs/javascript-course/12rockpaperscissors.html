<!DOCTYPE html> <!--special code that allows to use modern features of code-->
<!--style alllows us to writer CSS code-->
<!--CSS-selector-->
<html>
  <head>
    <title>Rock Paper Scissors</title>
    <style>
      body{
        background-color: rgb(25,25,25);
        color: white;
        font-family: Ariel;
      }
      .title{
        font-size: 30px;
        font-weight: bold;
      }
      .move-icon{
        height: 50px;
        
      }
      .move-button{
        background-color: transparent;
        border: 3px solid white;
        width: 120px;
        height: 120px;
        border-radius: 60px;
        margin-right: 10px;
        cursor: pointer;
      }
      .result{
        font-size: 25px;
        font-weight: bold;
      }
      .score{
        margin-top: 60px;
      }
      .reset-score-button, .auto-play-button{
        background-color: white;
        border: none;
        font-size: 15px;
        padding: 8px 15px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <p class="title">Rock Paper Scissors</p>
    <button onclick="
      playGame('rock');
    " class="move-button"><img src="images/rock-sign.png" class="move-icon">
    </button>
    <button onclick="
      playGame('paper');
    " class="move-button"><img src="images/paper-sign.png" class="move-icon">
    </button>
    <button onclick="
      playGame('scissors');
    " class="move-button"><img src="images/scissors-sign.png" class="move-icon">
    </button>
    
    <button onclick="
      score.wins = 0;
      score.loses = 0;
      score.ties = 0;
      localStorage.removeItem('score');
      updateScoreElement();
    " class="reset-score-button">Reset Score</button>
    <button class="auto-play-button js-auto-play-button" onclick="
    autoplay();
    ">Auto Play</button>
    <p class='js-result result'></p>
    <p class='js-moves'></p>
    <p class='js-score score'></p>
    <p></p>
    <script >
      let score =JSON.parse(localStorage.getItem('score'))||{
        wins : 0,
        loses :0,
        ties: 0,
      } // get item out of local storage
      updateScoreElement();

      let isAutoPlaying = false;
      let intervalId;
      function autoplay(){
        if(!isAutoPlaying){
          document.querySelector('.js-auto-play-button').innerHTML = 'Stop Playing';
          intervalId = setInterval( ()=>// returns a number
          {
            const playerMove = pickComputerMove();
            
            playGame(playerMove);
            

          }, 1000);
          isAutoPlaying = true;
        }
        else{
          clearInterval(intervalId);
          isAutoPlaying = false;
          document.querySelector('.js-auto-play-button').innerHTML = 'Auto Play';
        }
      }
      //if(!score)
      function playGame(playerMove){
        const computerMove = pickComputerMove();
        let result = '';
        if(playerMove === 'scissors')
        {
          if(computerMove === 'rock'){
            result='You lose.';
          }
          else if(computerMove === 'paper'){
              result='You win.';
          }
          else if(computerMove === 'scissors'){
              result='Tie.';
          }
        }
        else if(playerMove === 'paper'){
          if(computerMove === 'rock'){
          result='You win.';
          }
          else if(computerMove === 'paper'){
              result='Tie.';
          }
          else if(computerMove === 'scissors'){
              result='You lose.';
          }

        } else if(playerMove === 'rock'){
          if(computerMove === 'rock'){
          result='Tie.';
          }
          else if(computerMove === 'paper'){
              result='You lose.';
          }
          else if(computerMove === 'scissors'){
              result='You win.';
          }
        }
        if(result ==='You win.'){
          score.wins += 1;
        }
        else if(result ==='You lose.'){
          score.loses += 1;
        }
        else if(result ==='Tie.'){
          score.ties += 1;
        }

        localStorage.setItem('score', JSON.stringify(score)); // save inside local storage, only supports strings

        updateScoreElement();

        document.querySelector('.js-result').innerHTML = result;
        document.querySelector('.js-moves').innerHTML = `You <img src="images/${playerMove}-sign.png" class="move-icon"> - <img src="images/${computerMove}-sign.png" class="move-icon"> Computer`;
      }
      function updateScoreElement(){
        document.querySelector('.js-score').innerHTML = `Wins: ${score.wins} Loses: ${score.loses} Ties: ${score.ties}`;
      }
      function pickComputerMove(){
        const rndNum =Math.random();
        let computerMove ='';
        if(rndNum >= 0 && rndNum <= 1/3){
          computerMove = 'rock'}
        else if(rndNum > 1/3 && rndNum <= 2/3){
          computerMove = 'paper'}
        else if(rndNum > 2/3 && rndNum <= 1){
          computerMove = 'scissors'
        }
        return computerMove;
      }
    </script>
  </body>
</html>
