<!DOCTYPE html> 
<html>
  <head>
    <title class="js-title">Messaging App</title>
    <style>
      
    </style>
    
  </head>
  <body>
    <button onclick="
      addMess();
      ">Add</button>
    <button onclick="
      remMess();">Remove</button>
    <script>
      let mcount = 0;
      function addMess(){
        mcount++;
        document.querySelector('.js-title').innerHTML = `(${mcount}) New messages`;
      }
      function remMess(){
        if(mcount > 0){
          mcount--;
          document.querySelector('.js-title').innerHTML = `(${mcount}) New messages`;
        }
        if(mcount===0){
          document.querySelector('.js-title').innerHTML = `Messaging App`;
        }
        
      }
    </script>
  </body>
</html>
