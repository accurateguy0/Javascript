<html>
  <head>
    <title>Coin Flip Game</title>
    
  </head>
  <body>
    <p>Coin Flip Game</p>
    <script>
      const rnd = Math.random();
      let result = "";
      rnd < 0.5 ? result = 'heads': result ='tails'
      let guess = 'heads';
      result === guess ? console.log('You win!'): console.log('You lose!');
    </script>
  </body>
</html>
