<!DOCTYPE html>
<html>
<head>
  <p>Fahrenheit & Celsius</p>
</head>
<body>
  <script>
    function convertToFahrenheit(Celsius){
      Fahrenheit = (Celsius*9/5)+32;
      return Fahrenheit;
    }
    console.log(convertToFahrenheit(25));
    function convertToCelsius(Fahrenheit){
      Celsius = (Fahrenheit-32)*5/9;
      return Celsius;
    }
    console.log(convertToCelsius(86));
    function convertToTemperature(temp, unit){
      let Temperature = 0;
      if(unit ==='F'){
        Temperature = convertToCelsius(temp);
      }
        
      else if(unit === 'C'){
        Temperature = convertToFahrenheit(temp);
      }
      return Temperature;
    }
    console.log(convertToTemperature(25, 'C'));
    console.log(convertToTemperature(86, 'F'));
  </script>
</body>
</html>
