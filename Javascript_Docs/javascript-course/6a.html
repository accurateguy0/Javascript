<!DOCTYPE html> <!--special code that allows to use modern features of code-->
<!--style alllows us to writer CSS code-->
<!--CSS-selector-->
<html>
  <head>
    <title>Good morning</title>
    
  </head>
  <body>
    <script>
      let hour = 19.48;
      let name = 'Dawid';
      if(hour >= 6 && hour <= 12)
      {
        console.log(`Good morning ${name}!`);
      }
      else if(hour >= 13 && hour <= 17){
        console.log(`Good afternoon ${name}!`);
      }
      else{
        console.log(`Good night ${name}!`);
      }
    </script>
  </body>
</html>
