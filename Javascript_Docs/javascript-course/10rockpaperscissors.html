<!DOCTYPE html> <!--special code that allows to use modern features of code-->
<!--style alllows us to writer CSS code-->
<!--CSS-selector-->
<html>
  <head>
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="styles/10rockpaperscissors.css"> 
  </head>
  <body>
    <p class="title">Rock Paper Scissors</p>
    <button onclick="
      playGame('rock');
    " class="move-button"><img src="images/rock-sign.png" class="move-icon">
    </button>
    <button onclick="
      playGame('paper');
    " class="move-button"><img src="images/paper-sign.png" class="move-icon">
    </button>
    <button onclick="
      playGame('scissors');
    " class="move-button"><img src="images/scissors-sign.png" class="move-icon">
    </button>
    
    <button onclick="
      score.wins = 0;
      score.loses = 0;
      score.ties = 0;
      localStorage.removeItem('score');
      updateScoreElement();
    " class="reset-score-button">Reset Score</button>
    <p class='js-result result'></p>
    <p class='js-moves'></p>
    <p class='js-score score'></p>
    <p></p>
    <script src="scripts/10rockpaperscissors.js">
    </script>
  </body>
</html>
