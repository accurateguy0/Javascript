<!DOCTYPE html> 
<html>
  <head>
    <title>Calculator</title>
    <link rel="stylesheet" href="styles/10calculator.css">
  </head>
  <body>
    <p class="js-display-math"></p>
    <p>
      <button onclick="
      updateCalculation('1');
      " class="js-black-button">1</button>
      <button class="js-black-button" onclick="
      updateCalculation('2');
      ">2</button>
      <button class="js-black-button" onclick="
      updateCalculation('3');
      ">3</button>
      <button class="js-orange-button" onclick="
      updateCalculation('+');
      ">+</button>
    </p>
    <p>
      <button class="js-black-button" onclick="
      updateCalculation('4');
      ">4</button>
      <button class="js-black-button" onclick="
      updateCalculation('5');
      ">5</button>
      <button class="js-black-button" onclick="
      updateCalculation('6');
      ">6</button>
      <button class="js-orange-button" onclick="
      updateCalculation('-');
      ">-</button>
    </p>
    <p>
      <button class="js-black-button" onclick="
      updateCalculation('7');
      ">7</button>
      <button class="js-black-button" onclick="
      updateCalculation('8');
      ">8</button>
      <button class="js-black-button" onclick="
      updateCalculation('9');
      ">9</button>
      <button class="js-orange-button" onclick="
      updateCalculation('*');
      ">*</button>
    </p>
    <p>
      <button class="js-black-button" onclick="
      updateCalculation('0');
      ">0</button>
      <button class="js-black-button" onclick="
      updateCalculation('.');
      ">.</button>
      <button class="js-black-button" onclick="
      updateCalculation('=');
      ">=</button>
      <button class="js-orange-button" onclick="
      updateCalculation('/');
      ">/</button>
    </p>
    <p>
      <button class="js-black-button" onclick="
      updateCalculation('Clear');
      ">
      Clear
      </button>
    </p>
    <script src="scripts/10calculator.js"></script>
  </body>
</html>
