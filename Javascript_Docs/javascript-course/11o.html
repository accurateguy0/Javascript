      function removeEgg(foods){
        let noEgg = [];
        eggCount = 0;
        let revFoods = foods.slice(0, foods.length);
        revFoods.reverse();
        for(let i=0;i<revFoods.length;i++){
          
          if(revFoods[i] === 'egg' && eggCount < 2){
            eggCount++;
            continue;
          }
          noEgg.push(revFoods[i]);
        }
        noEgg.reverse();
        return noEgg;
      }
      function findIndex(array,word){
        for(let i=0;i<array.length;i++){
          if(array[i] === word){
            return i;
          }
          
            
          
        }
        return -1;
      }
      function unique(array){
        let uarray = [];
        for(let i=0;i<array.length;i++){
          let word = array[i];
          if(findIndex(uarray, word)=== -1){
            uarray.push(word);
          }
        }
        return uarray;
      }
