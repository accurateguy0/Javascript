<!DOCTYPE html> <!--special code that allows to use modern features of code-->
<!--style alllows us to writer CSS code-->
<!--CSS-selector-->
<html>
  <head>
    <title>Coin Flip Game</title>
    
  </head>
  <body>
    <p>Coin Flip Game</p>
    <button onclick="
      playGame('heads');
      ">heads</button>
    <button onclick="
      playGame('tails');
      ">tails</button>
    
    <script>
      console.log(JSON.parse(localStorage.getItem('score')));
      let result = "";
      const score =JSON.parse(localStorage.getItem('score'))||{
        wins:0,
        losses:0
      };
      function playGame(guess){
        const rnd = Math.random();
        rnd < 0.5 ? result = 'heads': result ='tails';
        if(result === guess){
          score.wins+=1;
          console.log(`You win! wins: ${score.wins}, loses: ${score.losses}`);
        } 
        else{
          score.losses+=1;
          console.log(`You lose! wins: ${score.wins}, loses: ${score.losses}`);
        } 
        localStorage.setItem('score', JSON.stringify(score));
      }
    </script>
  </body>
</html>
